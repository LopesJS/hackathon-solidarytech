# =============================================================================
# Workflow: CI - ngo-service
# Build, teste de integração, SAST/SCA (Trivy) e push para ECR (lab).
# =============================================================================
name: "CI — ngo-service"

on:
  push:
    branches: [main]
    paths:
      - "src/hackathon-DCLT-main/ngo-service/**"
      - ".github/workflows/ci-ngo-service.yml"
  workflow_dispatch:

env:
  SERVICE:     ngo-service
  PORT:        "8081"
  DOCKERFILE:  src/hackathon-DCLT-main/ngo-service/Dockerfile
  CONTEXT:     src/hackathon-DCLT-main/ngo-service

jobs:
  build-scan-push-deploy:
    name: Build → Scan → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Configurar credenciais AWS ────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 3. Login no ECR ──────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Definir tags da imagem ────────────────────────────────────────────
      - name: Set image metadata
        id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE="${{ secrets.ECR_NGO_URL }}"
          echo "sha_tag=sha-${SHA}"              >> $GITHUB_OUTPUT
          echo "image_sha=${IMAGE}:sha-${SHA}"   >> $GITHUB_OUTPUT
          echo "image_latest=${IMAGE}:latest"    >> $GITHUB_OUTPUT

      # ── 5. Build da imagem ───────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --file ${{ env.DOCKERFILE }} \
            --tag ${{ steps.meta.outputs.image_sha }} \
            --tag ${{ steps.meta.outputs.image_latest }} \
            --label "git-commit=${{ github.sha }}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            ${{ env.CONTEXT }}

      # ── 6. Scan de segurança com Trivy ───────────────────────────────────────
      - name: Security scan — Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ steps.meta.outputs.image_sha }}
          format:         "table"
          severity:       "CRITICAL,HIGH"
          exit-code:      "0"
          ignore-unfixed: true

      # ── 7. Gerar relatório SARIF (visível na aba Security do GitHub) ──────────
      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ steps.meta.outputs.image_sha }}
          format:         "sarif"
          output:         "trivy-results.sarif"
          severity:       "CRITICAL,HIGH"
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

      # ── 8. Push para ECR ─────────────────────────────────────────────────────
      - name: Push image to ECR
        run: |
          docker push ${{ steps.meta.outputs.image_sha }}
          docker push ${{ steps.meta.outputs.image_latest }}
          echo "✅ Imagem publicada: ${{ steps.meta.outputs.image_sha }}"

      # ── 9. Atualizar ECS com a nova imagem ───────────────────────────────────
      - name: Deploy to ECS
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition solidarytech-lab-${{ env.SERVICE }} \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "${{ steps.meta.outputs.image_sha }}" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status,
                 .requiresAttributes, .compatibilities,
                 .registeredAt, .registeredBy)')

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ env.SERVICE }}" \
            --task-definition "$NEW_TASK_ARN" \
            --force-new-deployment \
            --query 'service.{Status:status,Desired:desiredCount}' \
            --output json

          echo "✅ ECS atualizado: ${{ env.SERVICE }} → $NEW_TASK_ARN"

      # ── 10. Aguardar service estabilizar (com retry e timeout estendido) ──────
      - name: Wait for ECS stability
        run: |
          echo "Aguardando ${{ env.SERVICE }} estabilizar..."

          # aws ecs wait tem limite fixo de ~10 min (40 tentativas × 15s).
          # Em Fargate Spot + ALB health check, o primeiro deploy pode levar
          # até 15 min (pull da imagem + startPeriod do health check + TG drain).
          # Solução: polling manual com timeout de 20 minutos.

          CLUSTER="${{ secrets.ECS_CLUSTER }}"
          SERVICE="${{ env.SERVICE }}"
          TIMEOUT=1200   # 20 minutos
          INTERVAL=20    # checar a cada 20 segundos
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(aws ecs describe-services \
              --cluster "$CLUSTER" \
              --services "$SERVICE" \
              --query 'services[0].{running:runningCount,desired:desiredCount,pending:pendingCount}' \
              --output json)

            RUNNING=$(echo "$STATUS" | jq -r '.running')
            DESIRED=$(echo "$STATUS" | jq -r '.desired')
            PENDING=$(echo "$STATUS" | jq -r '.pending')

            echo "  [${ELAPSED}s] running=${RUNNING} desired=${DESIRED} pending=${PENDING}"

            if [ "$RUNNING" -eq "$DESIRED" ] && [ "$PENDING" -eq 0 ] && [ "$DESIRED" -gt 0 ]; then
              echo "✅ $SERVICE estável (${RUNNING}/${DESIRED} tasks rodando)"
              exit 0
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "❌ Timeout: $SERVICE não estabilizou em ${TIMEOUT}s"
          echo "Investigar no console ECS ou via:"
          echo "  aws ecs describe-services --cluster $CLUSTER --services $SERVICE"
          echo "  aws logs tail /ecs/solidarytech/lab/$SERVICE --since 10m"
          exit 1

      # ── 11. Summary no GitHub Actions ────────────────────────────────────────
      - name: Job Summary
        if: always()
        run: |
          echo "## 🐳 ${{ env.SERVICE }} — Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Imagem | \`${{ steps.meta.outputs.image_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | \`${{ secrets.ECS_CLUSTER }}\` |" >> $GITHUB_STEP_SUMMARY
