# =============================================================================
# Workflow: infra-drift-detection
# Vocareum/AWS Academy: credenciais estáticas + session token
# =============================================================================
name: "Infra - Terraform Drift Detection"

on:
  # schedule:
  #   - cron: "0 6 * * *"   # Desabilitado: credenciais Vocareum expiram
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  TF_VERSION: "1.8.0"
  AWS_REGION: "us-east-1"

jobs:
  drift-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [lab, aws-prod]
    environment: ${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]     && MISSING="$MISSING AWS_ACCESS_KEY_ID"
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING="$MISSING AWS_SECRET_ACCESS_KEY"
          [ -z "${{ secrets.AWS_SESSION_TOKEN }}" ]     && MISSING="$MISSING AWS_SESSION_TOKEN"
          [ -z "${{ secrets.DB_PASSWORD }}" ]           && MISSING="$MISSING DB_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "❌ Secrets faltando:$MISSING"
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        run: terraform init

      - name: Detect Drift
        id: drift
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        env:
          TF_VAR_db_password:          ${{ secrets.DB_PASSWORD }}
          TF_VAR_newrelic_license_key: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
        run: |
          terraform plan \
            -detailed-exitcode \
            -no-color 2>&1 | tee drift_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Open Issue on Drift
        if: steps.drift.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync(
              'infra/terraform/environments/${{ matrix.environment }}/drift_output.txt',
              'utf8'
            ).slice(0, 10000);
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Drift detectado em \`${{ matrix.environment }}\` — ${new Date().toISOString().split('T')[0]}`,
              body: `## Drift de Infraestrutura Detectado\n\nO Terraform identificou mudanças no ambiente \`${{ matrix.environment }}\` que não estão no código.\n\n<details><summary>Detalhes</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>\n\n**Ação necessária:** execute \`terraform apply\` ou reverta as mudanças manuais.`,
              labels: ['infrastructure', 'drift', '${{ matrix.environment }}']
            });
