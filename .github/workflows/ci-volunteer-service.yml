# =============================================================================
# Workflow: CI - volunteer-service
# Build, teste de integração, SAST/SCA (Trivy) e push para ECR (lab).
# =============================================================================
name: "CI — volunteer-service"

on:
  push:
    branches: [main]
    paths:
      - "src/hackathon-DCLT-main/volunteer-service/**"
      - ".github/workflows/ci-volunteer-service.yml"
  workflow_dispatch:

env:
  SERVICE:    volunteer-service
  PORT:       "8083"
  DOCKERFILE: src/hackathon-DCLT-main/volunteer-service/Dockerfile
  CONTEXT:    src/hackathon-DCLT-main/volunteer-service

jobs:
  build-scan-push-deploy:
    name: Build → Scan → Push → Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE="${{ secrets.ECR_VOLUNTEER_URL }}"
          echo "sha_tag=sha-${SHA}"            >> $GITHUB_OUTPUT
          echo "image_sha=${IMAGE}:sha-${SHA}"    >> $GITHUB_OUTPUT
          echo "image_latest=${IMAGE}:latest"     >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --file ${{ env.DOCKERFILE }} \
            --tag ${{ steps.meta.outputs.image_sha }} \
            --tag ${{ steps.meta.outputs.image_latest }} \
            --label "git-commit=${{ github.sha }}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            ${{ env.CONTEXT }}

      - name: Security scan — Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ steps.meta.outputs.image_sha }}
          format:         "table"
          severity:       "CRITICAL,HIGH"
          exit-code:      "0"
          ignore-unfixed: true

      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:  ${{ steps.meta.outputs.image_sha }}
          format:     "sarif"
          output:     "trivy-results.sarif"
          severity:   "CRITICAL,HIGH"
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

      - name: Push image to ECR
        run: |
          docker push ${{ steps.meta.outputs.image_sha }}
          docker push ${{ steps.meta.outputs.image_latest }}

      - name: Deploy to ECS
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition solidarytech-lab-${{ env.SERVICE }} \
            --query 'taskDefinition' --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "${{ steps.meta.outputs.image_sha }}" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status,
                 .requiresAttributes, .compatibilities,
                 .registeredAt, .registeredBy)')

          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ env.SERVICE }}" \
            --task-definition "$NEW_TASK_ARN" \
            --force-new-deployment > /dev/null

          echo "✅ ECS atualizado: ${{ env.SERVICE }} → $NEW_TASK_ARN"

      - name: Wait for ECS stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ env.SERVICE }}"
          echo "✅ volunteer-service estável"

      - name: Job Summary
        if: always()
        run: |
          echo "## 🤝 volunteer-service — Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Imagem | \`${{ steps.meta.outputs.image_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY