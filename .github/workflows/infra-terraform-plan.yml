# =============================================================================
# Workflow: infra-terraform-plan
# Vocareum/AWS Academy: autentica via credenciais estáticas + session token
# (OIDC não é suportado — iam:CreateRole bloqueado)
# =============================================================================
name: "Infra - Terraform Plan"

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/terraform/**"

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.8.0"
  AWS_REGION: "us-east-1"

jobs:
  # ─── Terraform Validate + Format ──────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -recursive terraform/
        id: fmt

      - name: Validate modules
        working-directory: infra
        run: |
          for dir in terraform/modules/*/; do
            echo "Validating $dir..."
            cd "$dir"
            terraform init -backend=false
            terraform validate
            cd - > /dev/null
          done

      - name: Comment PR on fmt failure
        if: failure() && steps.fmt.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Terraform fmt** falhou. Execute `terraform fmt -recursive infra/terraform/` localmente e faça commit.'
            })

  # ─── Terraform Plan por environment ───────────────────────────────────────
  plan:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [lab, aws-prod]
    environment: ${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]     && MISSING="$MISSING AWS_ACCESS_KEY_ID"
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING="$MISSING AWS_SECRET_ACCESS_KEY"
          [ -z "${{ secrets.AWS_SESSION_TOKEN }}" ]     && MISSING="$MISSING AWS_SESSION_TOKEN"
          [ -z "${{ secrets.DB_PASSWORD }}" ]           && MISSING="$MISSING DB_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "❌ Secrets faltando:$MISSING"
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: infra/terraform/environments/${{ matrix.environment }}
        env:
          TF_VAR_db_password:          ${{ secrets.DB_PASSWORD }}
          TF_VAR_newrelic_license_key: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
        run: |
          terraform plan \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: infra/terraform/environments/${{ matrix.environment }}/tfplan
          retention-days: 5

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync(
              'infra/terraform/environments/${{ matrix.environment }}/plan_output.txt',
              'utf8'
            ).slice(0, 60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Terraform Plan — \`${{ matrix.environment }}\`\n<details><summary>Expandir</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>`
            });

  # ─── tfsec — Security scan ────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/terraform/
          soft_fail: false
          format: lovely
