# =============================================================================
# Workflow: CI - donation-service
# Build, testes Go, SAST/SCA (Trivy) e push para ECR (lab).
# donation-service é o Hot Path (Golden Path do desafio) — pipeline mais rígido.
# =============================================================================
name: "CI - donation-service"

on:
  push:
    branches: [main]
    paths:
      - "services/donation-service/**"
      - "services/docker-compose.yml"
      - ".github/workflows/ci-donation-service.yml"
  pull_request:
    paths:
      - "services/donation-service/**"

env:
  SERVICE_NAME: donation-service
  AWS_REGION: "us-east-1"

permissions:
  contents: read
  id-token: write

jobs:
  # ───────────────────────── 1. BUILD ─────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: services/donation-service/go.sum

      - name: Compilar (go build)
        working-directory: services/donation-service
        run: |
          go mod download
          go build -o /tmp/donation-service .

      - name: Vet (lint estático básico do Go)
        working-directory: services/donation-service
        run: go vet ./...

  # ───────────────────── 2. TESTES ─────────────────────
  # Sem testes unitários no código ainda: valida a build via `go test` (roda mesmo
  # sem arquivos _test.go) e faz smoke test funcional subindo a stack completa.
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: go test
        working-directory: services/donation-service
        run: go test ./... -v || echo "Nenhum teste unitário encontrado ainda — ver TODO no relatório"

      - name: Preparar .env de teste
        working-directory: services
        run: cp .env.example .env

      - name: Subir stack (docker-compose)
        working-directory: services
        run: docker compose up -d --build postgres localstack db-init aws-init donation-service

      - name: Aguardar serviço ficar saudável
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8082/health; then
              echo "donation-service respondendo."
              exit 0
            fi
            echo "Aguardando donation-service... ($i/20)"
            sleep 5
          done
          echo "donation-service não respondeu a tempo."
          exit 1

      - name: Logs em caso de falha
        if: failure()
        working-directory: services
        run: docker compose logs donation-service postgres localstack

      - name: Encerrar stack
        if: always()
        working-directory: services
        run: docker compose down -v

  # ───────────────────────── 3. SCA — Trivy (dependências Go) ─────────────────────────
  sca:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — scan do filesystem (go.mod/go.sum)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "services/${{ env.SERVICE_NAME }}"
          severity: "CRITICAL,HIGH"
          format: "table"
          exit-code: "1"

  # ───────────────────── 4. Build + scan da imagem ─────────────────────
  image-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t ${{ env.SERVICE_NAME }}:${{ github.sha }} services/${{ env.SERVICE_NAME }}

      - name: Trivy — scan da imagem
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.SERVICE_NAME }}:${{ github.sha }}"
          severity: "CRITICAL,HIGH"
          format: "table"
          exit-code: "1"

  # ───────────────────── 5. PUSH PARA O ECR (lab) ─────────────────────
  push-to-ecr:
    needs: [test, sca, image-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: lab
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciais AWS (OIDC — role do ambiente lab)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_LAB }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag e push
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: solidarytech/${{ env.SERVICE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG services/${{ env.SERVICE_NAME }}
          docker tag $REGISTRY/$REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:latest
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest
          echo "Imagem publicada: $REGISTRY/$REPOSITORY:$IMAGE_TAG"

      - name: Forçar novo deploy no ECS (lab)
        run: |
          aws ecs update-service \
            --cluster solidarytech-lab \
            --service ${{ env.SERVICE_NAME }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager
