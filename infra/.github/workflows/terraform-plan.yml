# =============================================================================
# Workflow: terraform-plan
# Dispara em PRs para main — valida, formata e planeja Terraform.
# =============================================================================
name: "Terraform Plan"

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"

permissions:
  contents:      read
  pull-requests: write
  id-token:      write   # OIDC para AWS

env:
  TF_VERSION: "1.8.0"
  AWS_REGION: "us-east-1"

jobs:
  # ─── Detecta quais environments foram modificados ──────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.filter.outputs.environments }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            lab:
              - 'terraform/environments/lab/**'
              - 'terraform/modules/**'
              - 'terraform/global/**'
            aws-prod:
              - 'terraform/environments/aws-prod/**'
              - 'terraform/modules/**'
              - 'terraform/global/**'

  # ─── Terraform Validate + Format ──────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/
        id: fmt

      - name: Validate modules
        run: |
          for dir in terraform/modules/*/; do
            echo "Validating $dir..."
            cd $dir
            terraform init -backend=false
            terraform validate
            cd -
          done

      - name: Comment PR on fmt failure
        if: failure() && steps.fmt.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Terraform fmt** falhou. Execute `terraform fmt -recursive terraform/` localmente e faça commit.'
            })

  # ─── Terraform Plan por environment ───────────────────────────────────────
  plan:
    needs: [validate, detect-changes]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [lab, aws-prod]
    environment: ${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:  ${{ secrets.AWS_ROLE_ARN }}
          aws-region:      ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          terraform plan \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: terraform/environments/${{ matrix.environment }}/tfplan
          retention-days: 5

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync(
              'terraform/environments/${{ matrix.environment }}/plan_output.txt',
              'utf8'
            ).slice(0, 60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Terraform Plan — \`${{ matrix.environment }}\`\n<details><summary>Expandir</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>`
            });

  # ─── tfsec — Security scan ────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/
          soft_fail: false
          format: lovely
