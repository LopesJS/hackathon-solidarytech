# docker-compose.yml
# Orquestra todos os serviços da plataforma SolidaryTech para execução local.

services:

  # ─────────────────────────────────────────────────────────────────
  # INFRAESTRUTURA
  # ─────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: solidary-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  localstack:
    image: localstack/localstack:3
    container_name: solidary-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: dynamodb,sqs
      AWS_DEFAULT_REGION: ${AWS_REGION}
      PERSISTENCE: 1
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4566/_localstack/health')\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────
  # INICIALIZAÇÃO DOS BANCOS DE DADOS
  # ─────────────────────────────────────────────────────────────────

  db-init:
    image: postgres:15-alpine
    container_name: solidary-db-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./ngo-service/db/init.sql:/init-ngo.sql:ro
      - ./donation-service/db/init.sql:/init-donation.sql:ro
    entrypoint: ["sh", "-c",
      "psql -h postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'CREATE DATABASE ngo_db;' || true &&
       psql -h postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'CREATE DATABASE donation_db;' || true &&
       psql -h postgres -U ${POSTGRES_USER} -d ngo_db -f /init-ngo.sql &&
       psql -h postgres -U ${POSTGRES_USER} -d donation_db -f /init-donation.sql &&
       echo 'Bancos inicializados com sucesso.'"
    ]
    restart: on-failure

  aws-init:
    # Usando a imagem do AWS CLI oficial — mais leve e focada só no CLI
    image: amazon/aws-cli:latest
    container_name: solidary-aws-init
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_REGION}
      AWS_DYNAMODB_TABLE: ${AWS_DYNAMODB_TABLE}
    # Usando a sintaxe de lista para o entrypoint — cada argumento é um elemento separado
    # Isso evita qualquer problema de parsing de shell ou indentação
    entrypoint:
      - /bin/bash
      - -c
      - |
        echo "Criando tabela DynamoDB..." &&
        aws dynamodb create-table \
          --endpoint-url http://localstack:4566 \
          --table-name "$${AWS_DYNAMODB_TABLE}" \
          --attribute-definitions AttributeName=volunteer_id,AttributeType=S \
          --key-schema AttributeName=volunteer_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --region "$${AWS_DEFAULT_REGION}" || echo "Tabela ja existe." &&
        echo "Criando fila SQS..." &&
        aws sqs create-queue \
          --endpoint-url http://localstack:4566 \
          --queue-name solidary-donations \
          --region "$${AWS_DEFAULT_REGION}" || echo "Fila ja existe." &&
        echo "Recursos AWS criados com sucesso."
    restart: on-failure

  # ─────────────────────────────────────────────────────────────────
  # MICROSSERVIÇOS
  # ─────────────────────────────────────────────────────────────────

  ngo-service:
    build:
      context: ./ngo-service
      dockerfile: Dockerfile
    image: solidarytech/ngo-service:local
    container_name: solidary-ngo-service
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: ${NGO_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  donation-service:
    build:
      context: ./donation-service
      dockerfile: Dockerfile
    image: solidarytech/donation-service:local
    container_name: solidary-donation-service
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      DATABASE_URL: ${DONATION_DATABASE_URL}
      AWS_REGION: ${AWS_REGION}
      AWS_SQS_URL: ${AWS_SQS_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
      aws-init:
        condition: service_completed_successfully
    restart: unless-stopped

  volunteer-service:
    build:
      context: ./volunteer-service
      dockerfile: Dockerfile
    image: solidarytech/volunteer-service:local
    container_name: solidary-volunteer-service
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"
      AWS_REGION: ${AWS_REGION}
      AWS_DYNAMODB_TABLE: ${AWS_DYNAMODB_TABLE}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
    depends_on:
      localstack:
        condition: service_healthy
      aws-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8083/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: solidary-dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: http://localstack:4566
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      localstack:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  localstack_data:
