apiVersion: apps/v1
kind: Deployment
metadata:
  name: volunteer-service
  namespace: solidarytech
  labels:
    app: volunteer-service
    project: solidarytech
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: volunteer-service
  template:
    metadata:
      labels:
        app: volunteer-service
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8083"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: volunteer-service
      securityContext:
        runAsNonRoot: true
        runAsUser:    1000
      containers:
        - name: volunteer-service
          image: REGISTRY/solidarytech/volunteer-service:TAG
          ports:
            - containerPort: 8083
              name: http
          envFrom:
            - secretRef:
                name: volunteer-service-secrets
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds:       10
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds:       20
---
apiVersion: v1
kind: Service
metadata:
  name: volunteer-service
  namespace: solidarytech
spec:
  selector:
    app: volunteer-service
  ports:
    - port: 80
      targetPort: 8083
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: volunteer-service
  namespace: solidarytech
