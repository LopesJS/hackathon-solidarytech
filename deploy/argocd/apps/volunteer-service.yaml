apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: volunteer-service
  namespace: argocd
  labels:
    project: solidarytech
    service: volunteer-service
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: solidarytech
  source:
    repoURL: https://github.com/LopesJS/hackathon-solidarytech
    targetRevision: main
    path: k8s/overlays/prod
    kustomize:
      images:
        - volunteer-service=123456789012.dkr.ecr.us-east-1.amazonaws.com/solidarytech/volunteer-service:latest
  destination:
    server: https://kubernetes.default.svc
    namespace: solidarytech
  syncPolicy:
    automated:
      prune:    true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration:    5s
        factor:      2
        maxDuration: 2m
  revisionHistoryLimit: 10
